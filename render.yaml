services:
  - type: web
    name: asturias-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: ADMIN_PIN
        sync: false
      - key: PORT
        value: 8080
