spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/asturias}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false
app:
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:5173}
server:
  port: ${PORT:8080}
