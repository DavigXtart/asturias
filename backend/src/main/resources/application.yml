spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/asturias}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
app:
  admin:
    default-pin: ${ADMIN_PIN:1234}
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:5173}
server:
  port: ${PORT:8080}
